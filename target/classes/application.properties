spring.application.name=ai-code-review-tool
server.port=8080

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/code-review-db

# JSON date format
spring.jackson.serialization.write-dates-as-timestamps=false
